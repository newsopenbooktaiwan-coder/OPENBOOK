<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>日本東京兒童繪本之旅｜團費試算儀表板</title>
<style>
  :root{
    --paper:#F7F3EC;
    --paper-deep:#EFE8DA;
    --ink:#2B2A28;
    --ink-soft:#6B6560;
    --stamp:#A8412F;      /* 書封印章紅 */
    --stamp-soft:#E8CFC7;
    --moss:#5C6B4E;       /* 書脊墨綠 */
    --moss-soft:#DCE3D3;
    --line:#D8CFBE;
    --paper-white:#FFFFFF;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:"Noto Serif TC","Songti TC","PMingLiU",serif;
    padding:32px 20px 80px;
  }
  .wrap{max-width:920px;margin:0 auto;}

  header{
    border-bottom:3px double var(--ink);
    padding-bottom:16px;
    margin-bottom:28px;
  }
  .eyebrow{
    font-family:"Helvetica Neue",Arial,sans-serif;
    font-size:12px;
    letter-spacing:.2em;
    color:var(--stamp);
    text-transform:uppercase;
    margin-bottom:6px;
  }
  h1{
    font-size:28px;
    margin:0 0 4px;
    font-weight:700;
    letter-spacing:.03em;
  }
  .sub{
    font-family:"Helvetica Neue",Arial,sans-serif;
    font-size:13px;
    color:var(--ink-soft);
  }

  .top-grid{
    display:grid;
    grid-template-columns:220px 1fr;
    gap:20px;
    margin-bottom:28px;
    align-items:stretch;
  }
  @media (max-width:680px){
    .top-grid{grid-template-columns:1fr;}
  }

  .people-card{
    background:var(--paper-white);
    border:1px solid var(--line);
    border-radius:6px;
    padding:20px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    gap:10px;
  }
  .people-card label{
    font-family:"Helvetica Neue",Arial,sans-serif;
    font-size:12px;
    color:var(--ink-soft);
    letter-spacing:.05em;
  }
  .people-input-row{
    display:flex;
    align-items:center;
    gap:10px;
  }
  input[type="number"]{
    font-family:"Helvetica Neue",Arial,sans-serif;
  }
  #people{
    width:80px;
    font-size:24px;
    padding:6px 8px;
    border:1px solid var(--line);
    border-radius:4px;
    background:var(--paper);
    color:var(--ink);
  }
  input[type="range"]{
    width:100%;
    accent-color:var(--stamp);
  }
  .people-note{
    font-family:"Helvetica Neue",Arial,sans-serif;
    font-size:11px;
    color:var(--ink-soft);
  }

  .total-card{
    background:var(--ink);
    color:var(--paper);
    border-radius:6px;
    padding:20px 24px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    position:relative;
    overflow:hidden;
  }
  .total-card .stamp-mark{
    position:absolute;
    right:-10px;
    top:-10px;
    font-size:90px;
    opacity:.06;
    font-weight:700;
    font-family:"Helvetica Neue",Arial,sans-serif;
  }
  .total-label{
    font-family:"Helvetica Neue",Arial,sans-serif;
    font-size:12px;
    letter-spacing:.15em;
    color:var(--stamp-soft);
    text-transform:uppercase;
    margin-bottom:6px;
  }
  .total-value{
    font-size:44px;
    font-weight:700;
    line-height:1.1;
    letter-spacing:.01em;
  }
  .total-value span.unit{
    font-size:18px;
    font-weight:400;
    margin-left:4px;
    color:var(--paper-deep);
  }
  .total-sub{
    margin-top:10px;
    font-family:"Helvetica Neue",Arial,sans-serif;
    font-size:12px;
    color:#C9C4BA;
    display:flex;
    gap:16px;
    flex-wrap:wrap;
  }
  .total-sub b{color:var(--paper);font-weight:600;}

  table{
    width:100%;
    border-collapse:collapse;
    background:var(--paper-white);
    border:1px solid var(--line);
    border-radius:6px;
    overflow:hidden;
  }
  thead th{
    font-family:"Helvetica Neue",Arial,sans-serif;
    font-size:11px;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:var(--ink-soft);
    text-align:left;
    padding:10px 12px;
    border-bottom:1px solid var(--line);
    background:var(--paper-deep);
  }
  tbody td{
    padding:8px 12px;
    border-bottom:1px solid var(--line);
    font-size:14px;
    vertical-align:middle;
  }
  tbody tr:last-child td{border-bottom:none;}
  tbody tr.excluded{opacity:.4;}
  .item-idx{
    font-family:"Helvetica Neue",Arial,sans-serif;
    font-size:11px;
    color:var(--ink-soft);
    width:28px;
  }
  .item-name{
    font-weight:600;
    min-width:150px;
  }
  .item-name input{
    font-family:"Noto Serif TC",serif;
    font-weight:600;
    font-size:14px;
    border:none;
    background:transparent;
    width:100%;
    color:var(--ink);
    border-bottom:1px dashed transparent;
  }
  .item-name input:focus{
    outline:none;
    border-bottom:1px dashed var(--stamp);
  }
  select{
    font-family:"Helvetica Neue",Arial,sans-serif;
    font-size:12px;
    padding:5px 6px;
    border:1px solid var(--line);
    border-radius:4px;
    background:var(--paper);
    color:var(--ink);
  }
  .amount-input{
    width:100px;
    padding:5px 8px;
    border:1px solid var(--line);
    border-radius:4px;
    background:var(--paper);
    font-family:"Helvetica Neue",Arial,sans-serif;
    font-size:14px;
    text-align:right;
    color:var(--ink);
  }
  .per-person{
    font-family:"Helvetica Neue",Arial,sans-serif;
    font-weight:700;
    text-align:right;
    white-space:nowrap;
    color:var(--moss);
  }
  .include-cell{
    text-align:center;
    width:36px;
  }
  input[type="checkbox"]{
    accent-color:var(--stamp);
    width:16px;
    height:16px;
    cursor:pointer;
  }

  tfoot td{
    padding:12px;
    font-family:"Helvetica Neue",Arial,sans-serif;
    font-weight:700;
    font-size:15px;
    border-top:2px solid var(--ink);
    background:var(--paper-deep);
  }
  tfoot td.per-person{color:var(--stamp);font-size:17px;}

  .actions{
    margin-top:14px;
    display:flex;
    gap:10px;
    justify-content:flex-end;
  }
  button{
    font-family:"Helvetica Neue",Arial,sans-serif;
    font-size:12px;
    padding:8px 14px;
    border-radius:4px;
    border:1px solid var(--line);
    background:var(--paper-white);
    color:var(--ink-soft);
    cursor:pointer;
  }
  button:hover{
    border-color:var(--stamp);
    color:var(--stamp);
  }
  button.primary{
    background:var(--ink);
    color:var(--paper);
    border-color:var(--ink);
  }
  button.primary:hover{
    background:var(--stamp);
    border-color:var(--stamp);
    color:var(--paper);
  }

  .foot-note{
    margin-top:20px;
    font-family:"Helvetica Neue",Arial,sans-serif;
    font-size:11.5px;
    color:var(--ink-soft);
    line-height:1.7;
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="eyebrow">Openbook 閱讀誌・團費試算</div>
    <h1>日本東京兒童繪本之旅</h1>
    <div class="sub">輸入報名人數與各項成本，即時試算每人團費與總營收</div>
  </header>

  <div class="top-grid">
    <div class="people-card">
      <label>報名人數（最多 30 人）</label>
      <div class="people-input-row">
        <input type="number" id="people" min="1" max="30" value="17">
        <span class="people-note" id="peopleTag">成團基準：17 人</span>
      </div>
      <input type="range" id="peopleRange" min="1" max="30" value="17">
    </div>

    <div class="total-card">
      <div class="stamp-mark">¥</div>
      <div class="total-label">每人團費（建議售價）</div>
      <div class="total-value" id="totalPerPerson">66,529<span class="unit">元 / 人</span></div>
      <div class="total-sub">
        <span>總成本 <b id="grandTotal">0</b> 元</span>
        <span>OB 利潤合計 <b id="obProfitTotal">0</b> 元</span>
      </div>
    </div>
  </div>

  <table id="costTable">
    <thead>
      <tr>
        <th class="item-idx">項次</th>
        <th class="item-name">費用項目</th>
        <th>計算方式</th>
        <th>金額輸入</th>
        <th>每人成本</th>
        <th class="include-cell">計入</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
    <tfoot>
      <tr>
        <td colspan="4">每人合計團費</td>
        <td class="per-person" id="footTotal">0</td>
        <td></td>
      </tr>
    </tfoot>
  </table>

  <div class="actions">
    <button id="resetBtn">還原預設值</button>
  </div>

  <div class="foot-note">
    計算方式說明：「固定每人」＝此金額直接以每人計算，不受人數影響；「總額均攤」＝將總金額除以目前報名人數，得出每人分攤成本。
    第（十）項「郭孚與莊世瑩老師團費」預設不計入團費（比照原始試算 66,529 元／人），如需納入計算請勾選最右側「計入」欄位。
  </div>

</div>

<script>
const defaultItems = [
  { name:"基本團費（含一週食宿）", type:"fixed", amount:40000, include:true },
  { name:"郭孚導遊費",             type:"split", amount:60000, include:true },
  { name:"郭孚PM費",               type:"split", amount:40000, include:true },
  { name:"島內散步領隊費",         type:"split", amount:65000, include:true },
  { name:"莊世瑩老師講師費",       type:"split", amount:50000, include:true },
  { name:"島內散步合作費",         type:"split", amount:80000, include:true },
  { name:"OB利潤",                 type:"fixed", amount:3000,  include:true },
  { name:"廣告費",                 type:"split", amount:20000, include:true },
  { name:"機票燃油費",             type:"fixed", amount:5000,  include:true },
  { name:"郭孚與莊世瑩老師團費",   type:"split", amount:80000, include:false },
];

let items = JSON.parse(JSON.stringify(defaultItems));

const tbody = document.getElementById('tbody');
const peopleInput = document.getElementById('people');
const peopleRange = document.getElementById('peopleRange');
const peopleTag = document.getElementById('peopleTag');

function fmt(n){
  return Math.round(n).toLocaleString('en-US');
}

function getPeople(){
  let p = parseInt(peopleInput.value, 10);
  if(isNaN(p) || p < 1) p = 1;
  if(p > 30) p = 30;
  return p;
}

function render(){
  const people = getPeople();
  peopleTag.textContent = people === 17 ? "成團基準：17 人" : `目前試算人數：${people} 人（成團基準 17 人）`;
  tbody.innerHTML = '';

  let total = 0;
  let obProfitTotal = 0;

  items.forEach((item, idx) => {
    const perPerson = item.type === 'fixed' ? item.amount : (item.amount / people);
    if(item.include){
      total += perPerson;
      if(item.name.includes('OB利潤')) obProfitTotal += item.amount;
    }

    const tr = document.createElement('tr');
    if(!item.include) tr.classList.add('excluded');

    tr.innerHTML = `
      <td class="item-idx">${'（' + '一二三四五六七八九十'[idx] + '）'}</td>
      <td class="item-name"><input type="text" value="${item.name}" data-field="name" data-idx="${idx}"></td>
      <td>
        <select data-field="type" data-idx="${idx}">
          <option value="fixed" ${item.type==='fixed'?'selected':''}>固定每人</option>
          <option value="split" ${item.type==='split'?'selected':''}>總額均攤</option>
        </select>
      </td>
      <td>
        <input type="number" class="amount-input" value="${item.amount}" data-field="amount" data-idx="${idx}">
      </td>
      <td class="per-person">${fmt(perPerson)} 元</td>
      <td class="include-cell">
        <input type="checkbox" data-field="include" data-idx="${idx}" ${item.include?'checked':''}>
      </td>
    `;
    tbody.appendChild(tr);
  });

  document.getElementById('totalPerPerson').innerHTML = fmt(total) + '<span class="unit">元 / 人</span>';
  document.getElementById('footTotal').textContent = fmt(total) + ' 元';
  document.getElementById('grandTotal').textContent = fmt(total * people);
  document.getElementById('obProfitTotal').textContent = fmt(obProfitTotal);
}

tbody.addEventListener('input', (e) => {
  if(e.target.type === 'checkbox') return; // 交由 change 事件處理，避免重繪打斷勾選
  const field = e.target.dataset.field;
  const idx = e.target.dataset.idx;
  if(field === undefined || idx === undefined) return;
  if(field === 'name') items[idx].name = e.target.value;
  if(field === 'amount') items[idx].amount = parseFloat(e.target.value) || 0;
  render();
});
tbody.addEventListener('change', (e) => {
  const field = e.target.dataset.field;
  const idx = e.target.dataset.idx;
  if(field === undefined || idx === undefined) return;
  if(field === 'type') items[idx].type = e.target.value;
  if(field === 'include') items[idx].include = e.target.checked;
  render();
});

peopleInput.addEventListener('input', () => {
  let v = getPeople();
  peopleRange.value = v;
  render();
});
peopleRange.addEventListener('input', () => {
  peopleInput.value = peopleRange.value;
  render();
});

document.getElementById('resetBtn').addEventListener('click', () => {
  items = JSON.parse(JSON.stringify(defaultItems));
  peopleInput.value = 17;
  peopleRange.value = 17;
  render();
});

render();
</script>
</body>
</html>
